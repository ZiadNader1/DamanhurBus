<div class="contact-wrapper">
    <div class="contact-card">
        <header class="contact-header">
            <h1>{{ lang.t('contact_title') }}</h1>
            <p>{{ lang.t('contact_subtitle') }}</p>
        </header>

        <div class="contact-content">
            <!-- WhatsApp Group Section -->
            <div class="contact-item highlight">
                <div class="icon-box">
                    <i class="bi bi-whatsapp"></i>
                </div>
                <h3>{{ lang.t('contact_whatsapp') }}</h3>
                <p>{{ lang.t('contact_whatsapp_sub') }}</p>
                <a [href]="whatsappGroupLink" target="_blank" class="contact-btn whatsapp">
                    {{ lang.t('contact_join') }}
                </a>
            </div>
        </div>

        <footer class="contact-footer">
            <a routerLink="/" class="back-link">
                <i class="bi bi-arrow-right"></i> {{ lang.t('contact_back') }}
            </a>
        </footer>
    </div>
</div>
