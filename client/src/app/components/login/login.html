<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>{{ lang.t('login_title') }}</h2>
            <p>{{ lang.t('login_subtitle') }}</p>
        </div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="email">{{ lang.t('login_email') }}</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="admin@example.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password">{{ lang.t('login_password') }}</label>
                <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="login-btn" [disabled]="loading">
                {{ loading ? lang.t('login_loading') : lang.t('login_btn') }}
            </button>

            <div class="error-msg" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>
        </form>
    </div>
</div>
