<div class="select-wrapper">

    <!-- Hero / Intro -->
    <div class="hero-section">
        <h1>{{ lang.t('hero_title') }}</h1>
        <p>{{ lang.t('hero_subtitle') }}</p>
    </div>

    <!-- University Cards Grid -->
    <div class="universities-grid">
        <div class="uni-card" *ngFor="let uni of universities" (click)="goToBooking(uni.id)">
            <div class="uni-card-img" [style.background-image]="'url(' + uni.image + ')'"></div>
            <div class="uni-card-overlay"></div>
            <div class="uni-card-info">
                <strong>{{ lang.isArabic() ? uni.name : uni.nameEn }}</strong>
                <span>{{ lang.isArabic() ? uni.nameEn : uni.name }}</span>
            </div>
            <div class="uni-card-btn">
                <span>{{ lang.t('book_now') }}</span>
                <i class="bi bi-arrow-left"></i>
            </div>
        </div>
    </div>

</div>
